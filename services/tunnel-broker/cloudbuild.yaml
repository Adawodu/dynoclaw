steps:
  # Build the Docker image
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - 'us-central1-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/dynoclaw-tunnel-broker:$COMMIT_SHA'
      - '-t'
      - 'us-central1-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/dynoclaw-tunnel-broker:latest'
      - '.'
    dir: 'services/tunnel-broker'

  # Push to Artifact Registry
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - '--all-tags'
      - 'us-central1-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/dynoclaw-tunnel-broker'

  # Deploy to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: 'gcloud'
    args:
      - 'run'
      - 'deploy'
      - 'dynoclaw-tunnel-broker'
      - '--image'
      - 'us-central1-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/dynoclaw-tunnel-broker:$COMMIT_SHA'
      - '--region'
      - 'us-central1'
      - '--min-instances=0'
      - '--max-instances=10'
      - '--timeout=3600'
      - '--memory=512Mi'
      - '--service-account=dynoclaw-admin@$PROJECT_ID.iam.gserviceaccount.com'
      - '--set-secrets=TUNNEL_BROKER_SECRET=tunnel-broker-secret:latest'
      - '--allow-unauthenticated'

options:
  logging: CLOUD_LOGGING_ONLY

timeout: '600s'
